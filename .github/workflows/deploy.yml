name: Deploy to GitHub Pages

# Déploie l'app statique (racine du dépôt) sur GitHub Pages.
# Activez Settings → Pages → Source: "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Active automatiquement GitHub Pages s'il ne l'est pas déjà.
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Tout est statique : on publie la racine du dépôt.
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
